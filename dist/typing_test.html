        /* --- CSS Variables --- */
        :root {
            --background: #ffffff;
            --text-color: #333;
            --sub-text-color: #888;
            --primary-button-bg: #333;
            --secondary-button-bg: #f0f2f5;
            --correct-color: #26a269;
            --incorrect-color: #e74c3c;
            --incorrect-bg: #f8d7da;
            --cursor-color: #333;
            --header-bg: #2d3748;
            --primary-accent-color: #4299e1;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font: 'Roboto Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e9e9e9;
            color: var(--text-color);
            font-family: var(--font);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 80px;

        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 40px 0;
        }

        .container {
            width: 900px;
            max-width: 95%;
            background-color: var(--background);
            border-radius: 15px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .container.test-finished .active::before {
            display: none;
        }

        .container.test-finished .header,
        .container.test-finished .typing-area {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time-controls button {
            background: none;
            border: none;
            font-family: var(--font);
            color: var(--sub-text-color);
            font-size: 1rem;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .time-controls button:hover {
            color: var(--text-color);
        }

        .time-controls button.active {
            background-color: var(--primary-button-bg);
            color: white;
        }

        .timer {
            font-size: 2rem;
            font-weight: 500;
            color: var(--text-color);
        }

        .typing-area {
            line-height: 2.2;
            font-size: 1.6rem;
            height: 140px;
            overflow-y: hidden;
            position: relative;
            color: var(--sub-text-color);
            user-select: none;
            transition: opacity 0.3s ease;
            cursor: text;
        }

        .input-field {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 10;
            cursor: text;
        }

        .typing-text {
            /* Changed from margin-top to transform for smoother, bug-free scrolling */
            transition: transform 0.2s ease-out;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .word {
            display: inline-flex;
        }

        .typing-text span {
            position: relative;
        }

        .correct {
            color: var(--correct-color) !important;
        }

        .incorrect {
            color: var(--incorrect-color) !important;
            background-color: var(--incorrect-bg);
            border-radius: 4px;
        }

        .active::before {
            content: "";
            position: absolute;
            left: -1px;
            bottom: 2px;
            height: 80%;
            width: 2px;
            background-color: var(--cursor-color);
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        #results-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 500;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin: -10px 0 10px;
            display: none;
        }

        .container.test-finished #results-title {
            display: block;
        }

        .stats {
            display: grid;
            gap: 20px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
            transition: all 0.3s ease;
            grid-template-columns: repeat(4, 1fr);
        }

        .stat-item .value {
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .stat-item .label {
            font-size: 0.9rem;
            color: var(--sub-text-color);
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        .final-stat {
            display: none;
        }

        .container.test-finished .initial-stat {
            display: none;
        }

        .container.test-finished .final-stat {
            display: block;
        }

        .container.test-finished .stats {
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 25px;
            padding: 20px 0;
            border-top: none;
        }

        .container.test-finished .stat-item {
            background-color: #f8f9fa;
            padding: 20px 10px;
            border-radius: 8px;
        }

        .container.test-finished .stat-item .value {
            font-size: 2.2rem;
            color: var(--primary-button-bg);
            margin-bottom: 5px;
        }

        .container.test-finished .stat-item .label {
            font-size: 1rem;
            font-weight: 500;
        }

        .problem-keys.stat-item {
            grid-column: 1 / -1;
            background-color: transparent;
            padding: 10px 0;
        }

        .problem-keys .value {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 44px;
        }

        .problem-keys .key {
            background-color: var(--incorrect-bg);
            color: var(--incorrect-color);
            border: 1px solid #f5c6cb;
            font-family: var(--font);
            font-size: 1.5rem;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 6px;
            min-width: 35px;
            text-align: center;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 6;
        }

        #new-test-btn,

            font-family: var(--font);
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #new-test-btn {
            background-color: var(--primary-button-bg);
            color: white;
            border: 1px solid var(--primary-button-bg);
        }

        #end-test-btn {
            margin-right: 15px;
            background-color: var(--secondary-button-bg);
            color: var(--text-color);
            border: 1px solid #ddd;

            background-color: #555;
        }

        #end-test-btn:hover {
            background-color: #e2e2e2;
        }

        #pause-overlay {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-color);

            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #pause-overlay.visible {
            opacity: 1;
        }

        .main-header {
            background-color: var(--header-bg);
            padding: 0 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }

        .logo {
            color: #fff;
            font-family: var(--font-main);
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none
        }

            color: var(--primary-accent-color);
        }

            font-size: 1rem;

        }

        .main-nav a.active,

            color: #fff
        }

        .hamburger {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px
        }

        .hamburger .bar {
            width: 25px;
            height: 3px;
            background-color: #fff;
            border-radius: 5px;
            transition: all .3s ease-in-out
        }

        .main-footer {
            background-color: #e2e8f0;
            color: var(--sub-text-color);
            padding: 50px 40px 20px;
            flex-shrink: 0;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 40px
        }

        .footer-column .col-title {
            font-family: var(--font-main);
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 1.1rem
        }

        .footer-column ul {
            list-style: none
        }

        .footer-column li {
            margin-bottom: 10px
        }

        .footer-column a {
            color: var(--sub-text-color);
            text-decoration: none;
            transition: color .2s ease
        }

        .footer-column a:hover {
            color: var(--primary-button-bg)
        }

        .footer-bottom {
            border-top: 1px solid #cbd5e0;
            padding-top: 20px;
            text-align: center;
            font-size: .9rem;
            max-width: 1200px;
            margin: 0 auto
        }

        .content-section {
            background-color: var(--background);
            padding: 40px 35px;
            margin: 40px auto;
            width: 900px;
            max-width: 95%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            font-family: var(--font-main);
            line-height: 1.7;
        }

        .content-section h1,
        .content-section h2,
        .content-section h3 {
            color: var(--text-color);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .content-section h1 {
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-accent-color);
            padding-bottom: 20px;
        }

        .content-section h2 {
            font-size: 1.8rem;
            margin-top: 40px;
            border-left: 4px solid var(--primary-accent-color);
            padding-left: 15px;
        }

        .content-section h3 {
            font-size: 1.4rem;
            margin-top: 25px;
            font-weight: 600;
        }

        .content-section p {
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .content-section ul,
        .content-section ol {
            margin-left: 20px;
            margin-bottom: 20px;
            padding-left: 20px;
        }

        .content-section li {
            margin-bottom: 10px;
        }

        .content-section a {
            color: var(--primary-accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .content-section a:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width:768px) {
            .main-header {
                padding: 0 20px;
                height: 70px
            }

            body {
                padding-top: 70px;
            }

            .main-nav {
                display: none;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: var(--header-bg);
                flex-direction: column;
                padding: 20px;
                box-shadow: 0 5px 10px rgba(0, 0, 0, .1)
            }

            .main-nav.is-active {
                display: flex
            }

            .main-nav ul {
                flex-direction: column;
                width: 100%;
                text-align: center;
                gap: 15px
            }

            .hamburger {
                display: flex
            }

            .hamburger.is-active .bar:nth-child(2) {
                opacity: 0
            }

            .hamburger.is-active .bar:nth-child(1) {
                transform: translateY(8px) rotate(45deg)
            }

            .hamburger.is-active .bar:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg)
            }

            .main-footer {
                padding: 40px 20px 20px
            }

            .container.test-finished .stats {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            .content-section h1 {
                font-size: 1.8rem;
            }

            .content-section h2 {
                font-size: 1.5rem;
            }

            .content-section h3 {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 600px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .container {
                padding: 25px 20px;
            }

            .typing-area {
                font-size: 1.3rem;
                height: 115px;
            }

            .stat-item .value {
                font-size: 2rem;
            }

            .container.test-finished .stat-item .value {
                font-size: 1.8rem;
            }
        }

        /* adsas */



        .opop {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
        }

        .logol {
            display: inline-block;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Gradient text effect */
        .logol {
            background: linear-gradient(45deg, #26a269, #42e14c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Special color for "To" */
        .logol span {
            font-weight: 700;
            color: #42e14c;
            -webkit-text-fill-color: #42e14c;
        }

        /* Hover effects */
        .logol:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 30px rgba(66, 225, 76, 0.4);
            filter: brightness(1.2);
        }

        /* Optional floating animation */
        @keyframes float {
            0% {
                transform: translateX(-50%) translateY(0px);
            }

            50% {
                transform: translateX(-50%) translateY(-5px);
            }

            100% {
                transform: translateX(-50%) translateY(0px);
            }
        }

        .opop {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

            <div class="header">

                    <button data-time="15">15s</button>

                <button id="new-test-btn">New Test</button>
            </div>
        </div>
    </main>

                "Innovation thrives at the intersection of curiosity and problem-solving. It requires an open mind, a willingness to experiment, and the patience to fail forward. The greatest breakthroughs often come from asking bold questions. Innovation is fueled by the fearless pursuit of improvement.",
                "Kindness is a quiet force that leaves a lasting impact. A simple act can brighten a day, shift a perspective, or change a life. In a world that often feels divided, kindness bridges gaps and fosters unity. Be kind—always.",
                "The power of focus cannot be overstated. When you direct your attention with intention, distractions fall away and productivity soars. Focus brings clarity and depth to your efforts. Mastering it is the key to unlocking extraordinary potential.",
                "Rest is not laziness—it is essential for growth, clarity, and healing. In a world obsessed with constant hustle, taking time to recharge is a radical act of self-care. Balance fuels sustainable success. Protect your peace to preserve your power.",
                "Success is not about having more, but about becoming more. It’s a personal journey of development, self-awareness, and contribution. The most meaningful successes are those that align with our values. Define success on your own terms.",
                "Empathy allows us to understand and share the feelings of others. It deepens relationships, resolves conflict, and fosters compassion. In a connected world, empathy is not just a virtue—it’s a necessity. Walk in someone else’s shoes before judging.",
                "Your comfort zone is a beautiful place, but nothing ever grows there. Real growth happens when you challenge yourself, take risks, and embrace uncertainty. Every stretch builds strength. Don’t fear discomfort—it’s a sign that transformation is near.",
                "Words hold power beyond imagination. They can heal or hurt, uplift or destroy, motivate or discourage. Choosing our words carefully is a reflection of our character. Speak with intention, and let your language be a force for good.",
                "Confidence is built, not born. It grows with every challenge faced, every skill learned, and every failure overcome. It’s not about being perfect but about trusting yourself to figure things out. Confidence is the foundation of bold action.",
                "Imagination is the spark behind every great invention, story, and dream. It allows us to see what doesn’t yet exist and believe in what others call impossible. Nurturing imagination keeps creativity alive. Never stop dreaming.",
                "Honesty is the cornerstone of trust. In a world full of facades, truth builds authentic connections and lasting respect. Being honest, even when it’s difficult, is a powerful act of courage. Truth always finds its way to the surface.",
                "Legacy is not what you leave behind, but how you live every day. It’s built in the small moments of integrity, kindness, and impact. We all have the power to create a lasting ripple. Live in a way worth remembering."
            ];

            const container = document.querySelector(".container");
            const typingTextContainer = document.querySelector(".typing-text");
            const inputField = document.querySelector(".input-field");
            const newTestBtn = document.getElementById("new-test-btn");
            const timerEl = document.getElementById("timer");
            const wpmEl = document.getElementById("wpm");
            const accuracyEl = document.getElementById("accuracy");
            const correctCharsLiveEl = document.getElementById("correct-chars-live");
            const incorrectCharsLiveEl = document.getElementById("incorrect-chars-live");
            const timeControls = document.querySelector(".time-controls");
            const pauseOverlay = document.getElementById("pause-overlay");
            const endTestBtn = document.getElementById("end-test-btn");
            const resultsTitleEl = document.getElementById("results-title");

            let charIndex = 0;
            let timer;
            let maxTime = 60;
            let timeLeft = maxTime;
            let isTyping = false;
            let characters;
            let lastParaIndex = -1;
            let isAppending = false;

            // Permanent Statistics Trackers
            let totalKeystrokes = 0;
            let totalErrors = 0;
            let previousTypedValue = "";
            let errorKeysMap = {};

            // Auto-focus logic: Typing anything outside focuses the input field automatically.
            document.addEventListener("keydown", (e) => {
                const ignoredKeys = ["Shift", "Control", "Alt", "Meta", "Escape", "Enter", "Tab", "CapsLock", "PageUp", "PageDown", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
                if (!ignoredKeys.includes(e.key) && document.activeElement !== inputField && !container.classList.contains('test-finished')) {
                    inputField.focus();
                }
            });

            function loadParagraph() {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * paragraphs.length);
                } while (paragraphs.length > 1 && randomIndex === lastParaIndex);
                lastParaIndex = randomIndex;

                typingTextContainer.innerHTML = "";
                const paragraph = paragraphs[randomIndex];

                paragraph.split(" ").forEach(word => {
                    const wordDiv = document.createElement('div');
                    wordDiv.className = 'word';
                    word.split("").forEach(char => {
                        wordDiv.innerHTML += `<span>${char}</span>`;
                    });
                    typingTextContainer.appendChild(wordDiv);

                    const spaceSpan = document.createElement('span');
                    spaceSpan.classList.add('space');
                    spaceSpan.innerHTML = ' ';
                    typingTextContainer.appendChild(spaceSpan);
                });

                if (typingTextContainer.lastChild) {
                    typingTextContainer.removeChild(typingTextContainer.lastChild);
                }

                characters = typingTextContainer.querySelectorAll("div.word span, span.space");
                if (characters.length > 0) {
                    characters[0].classList.add("active");
                }
            }

            function appendParagraph() {
                if (isAppending) return;
                isAppending = true;

                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * paragraphs.length);
                } while (paragraphs.length > 1 && randomIndex === lastParaIndex);
                lastParaIndex = randomIndex;
                const newParagraph = paragraphs[randomIndex];

                const spaceSpan = document.createElement('span');
                spaceSpan.classList.add('space');
                spaceSpan.innerHTML = ' ';
                typingTextContainer.appendChild(spaceSpan);

                newParagraph.split(" ").forEach(word => {
                    const wordDiv = document.createElement('div');
                    wordDiv.className = 'word';
                    word.split("").forEach(char => {
                        wordDiv.innerHTML += `<span>${char}</span>`;
                    });
                    typingTextContainer.appendChild(wordDiv);

                    const spaceSpan2 = document.createElement('span');
                    spaceSpan2.classList.add('space');
                    spaceSpan2.innerHTML = ' ';
                    typingTextContainer.appendChild(spaceSpan2);
                });

                if (typingTextContainer.lastChild) {
                    typingTextContainer.removeChild(typingTextContainer.lastChild);
                }

                characters = typingTextContainer.querySelectorAll("div.word span, span.space");
                isAppending = false;
            }

            function resetTest() {
                loadParagraph();
                clearInterval(timer);
                timeLeft = maxTime;
                charIndex = 0;
                isTyping = false;

                // Reset permanent tracking variables
                totalKeystrokes = 0;
                totalErrors = 0;
                previousTypedValue = "";
                errorKeysMap = {};

                timerEl.innerText = timeLeft + 's';

                wpmEl.innerText = 0;
                accuracyEl.innerText = '100%';
                correctCharsLiveEl.innerText = 0;
                incorrectCharsLiveEl.innerText = 0;

                inputField.value = "";
                inputField.disabled = false;

                container.classList.remove('test-finished');
                pauseOverlay.classList.remove('visible');

                // Reset scroll perfectly
                typingTextContainer.style.transform = 'translateY(0px)';

                resultsTitleEl.style.display = "none";
                endTestBtn.style.display = "none";

                inputField.focus();
            }

            function handleTyping() {
                if (inputField.disabled) return;

                if (!isTyping) {
                    startTimer();
                }
                pauseOverlay.classList.remove('visible');

                const typedValue = inputField.value;
                const currentLength = typedValue.length;
                const prevLength = previousTypedValue.length;

                // Strict Error Tracking: Log mistake instantly instead of losing it upon backspace
                if (currentLength > prevLength) {
                    totalKeystrokes++;
                    const typedChar = typedValue[currentLength - 1];
                    const expectedSpan = characters[currentLength - 1];

                    if (expectedSpan) {
                        let expectedChar = expectedSpan.textContent;
                        if (expectedSpan.classList.contains('space')) expectedChar = ' ';

                        if (typedChar !== expectedChar) {
                            totalErrors++;
                            let keyForMap = expectedChar === ' ' ? 'space' : expectedChar.toLowerCase();
                            errorKeysMap[keyForMap] = (errorKeysMap[keyForMap] || 0) + 1;
                        }
                    }
                }

                previousTypedValue = typedValue;

                // Visual DOM rendering updates based on current text
                for (let i = 0; i < characters.length; i++) {
                    characters[i].classList.remove("correct", "incorrect", "active");
                }

                typedValue.split('').forEach((typedChar, index) => {
                    const characterSpan = characters[index];
                    if (characterSpan) {
                        let expectedChar = characterSpan.textContent;
                        if (characterSpan.classList.contains('space')) expectedChar = ' ';

                        if (expectedChar === typedChar) {
                            characterSpan.classList.add("correct");
                        } else {
                            characterSpan.classList.add("incorrect");
                        }
                    }
                });

                charIndex = currentLength;

                if (charIndex > 0 && charIndex < characters.length) {
                    const activeChar = characters[charIndex];
                    const typingArea = document.querySelector(".typing-area");
                    const threshold = typingArea.clientHeight * 2;
                    // Properly checking distance using reliable offset geometry
                    if (!isAppending && (typingTextContainer.scrollHeight - activeChar.offsetTop) < threshold) {
                        appendParagraph();
                    }
                }

                if (charIndex < characters.length) {
                    characters[charIndex].classList.add("active");
                    updateScroll();
                } else {
                    appendParagraph();
                    if (characters[charIndex]) {
                        characters[charIndex].classList.add("active");
                        updateScroll();
                    }
                }

                updateStats();
            }

            function updateScroll() {
                const activeChar = characters[charIndex];
                if (!activeChar) return;

                const offsetTop = activeChar.offsetTop;
                // Elegant logic: Keeps active typing line fixed near top after the first line. 
                // Prevents buggy jumps when resizing or backspacing.
                if (offsetTop > 40) {
                    typingTextContainer.style.transform = `translateY(-${offsetTop - 40}px)`;
                } else {
                    typingTextContainer.style.transform = `translateY(0px)`;
                }
            }

            function startTimer() {
                if (timeLeft > 0 && !isTyping) {
                    isTyping = true;
                    timer = setInterval(updateTimer, 1000);
                    endTestBtn.style.display = 'inline-block';
                }
            }

            function updateTimer() {
                if (timeLeft > 0) {
                    timeLeft--;
                    timerEl.innerText = timeLeft + 's';
                    if (isTyping) updateStats();
                } else {
                    finishTest();
                }
            }

            function pauseTest() {
                if (!isTyping || timeLeft <= 0 || container.classList.contains('test-finished')) return;
                clearInterval(timer);
                isTyping = false;
                pauseOverlay.classList.add('visible');
            }

            function resumeTest() {
                if (container.classList.contains('test-finished')) return;
                pauseOverlay.classList.remove('visible');
            }

            function finishTest() {
                clearInterval(timer);
                isTyping = false;
                inputField.disabled = true;
                pauseOverlay.classList.remove('visible');

                displayFinalResults();

                container.classList.add('test-finished');
                resultsTitleEl.style.display = 'block';
                endTestBtn.style.display = 'none';

                newTestBtn.focus();
            }

            function displayFinalResults() {
                const timeElapsed = maxTime - Math.max(0, timeLeft);
                const timeElapsedInMinutes = timeElapsed / 60;

                // Accuracy strictly counts every mistake you made, even if you deleted and corrected it.
                const accuracy = totalKeystrokes > 0 ? Math.round(((totalKeystrokes - totalErrors) / totalKeystrokes) * 100) : 100;

                // Final WPM based on your total correct output passed.
                const liveCorrectChars = document.querySelectorAll('.typing-text .correct').length;
                const wpm = (timeElapsedInMinutes > 0) ? Math.max(0, Math.round((liveCorrectChars / 5) / timeElapsedInMinutes)) : 0;

                // Word count analysis (accurately checks if you passed the end of the word)
                let correctWordsCount = 0;
                let incorrectWordsCount = 0;
                const words = typingTextContainer.querySelectorAll('.word');
                const charactersArray = Array.from(characters);

                words.forEach(word => {
                    const charsInWord = word.querySelectorAll('span');
                    const lastChar = charsInWord[charsInWord.length - 1];
                    const lastCharIndex = charactersArray.indexOf(lastChar);

                    // Count only words the cursor has completely moved past
                    if (charIndex > lastCharIndex) {
                        const hasError = word.querySelector('.incorrect');
                        if (hasError) {
                            incorrectWordsCount++;
                        } else {
                            correctWordsCount++;
                        }
                    }
                });

                // Top 5 Problematic Keys exactly as mistyped historically
                const sortedProblemKeys = Object.entries(errorKeysMap).sort(([, a], [, b]) => b - a);

                document.querySelector('#wpm-result .value').innerText = wpm;
                document.querySelector('#accuracy-result .value').innerText = accuracy + '%';
                document.querySelector('#time-taken-result .value').innerText = `${timeElapsed}s`;
                document.querySelector('#total-chars-result .value').innerText = totalKeystrokes;
                document.querySelector('#correct-chars-result .value').innerText = Math.max(0, totalKeystrokes - totalErrors);
                document.querySelector('#incorrect-chars-result .value').innerText = totalErrors;
                document.querySelector('#correct-words-result .value').innerText = correctWordsCount;
                document.querySelector('#incorrect-words-result .value').innerText = incorrectWordsCount;

                const problemKeysContainer = document.querySelector('#problem-keys-result .value');
                problemKeysContainer.innerHTML = '';
                if (sortedProblemKeys.length > 0) {
                    sortedProblemKeys.slice(0, 5).forEach(([key]) => {
                        const keyElement = document.createElement('span');
                        keyElement.className = 'key';
                        keyElement.textContent = key;
                        problemKeysContainer.appendChild(keyElement);
                    });
                } else {
                    problemKeysContainer.innerText = 'None';
                }
            }

            function handleTimeChange(e) {
                if (e.target.tagName === 'BUTTON') {
                    maxTime = parseInt(e.target.dataset.time, 10);
                    timeControls.querySelector('.active').classList.remove('active');
                    e.target.classList.add('active');
                    resetTest();
                }
            }

            function updateStats() {
                // Live correct WPM based on visual current board state
                const liveCorrectChars = document.querySelectorAll('.typing-text .correct').length;
                let timeElapsedInMinutes = (maxTime - timeLeft) / 60;
                if (timeElapsedInMinutes > 0) {
                    let wpm = Math.max(0, Math.round((liveCorrectChars / 5) / timeElapsedInMinutes));
                    wpmEl.innerText = wpm;
                } else {
                    wpmEl.innerText = 0;
                }

                // Strict tracking of correct & incorrect counts that don't decrease on backspace
                correctCharsLiveEl.innerText = Math.max(0, totalKeystrokes - totalErrors);
                incorrectCharsLiveEl.innerText = totalErrors;

                let accuracy = totalKeystrokes > 0 ? Math.round(((totalKeystrokes - totalErrors) / totalKeystrokes) * 100) : 100;
                accuracyEl.innerText = accuracy + '%';
            }

            inputField.addEventListener("input", handleTyping);
            inputField.addEventListener("focus", resumeTest);
            inputField.addEventListener("blur", pauseTest);
            newTestBtn.addEventListener("click", resetTest);
            timeControls.addEventListener("click", handleTimeChange);
            endTestBtn.addEventListener("click", finishTest);

            inputField.addEventListener('paste', (e) => e.preventDefault());

            newTestBtn.addEventListener('keydown', (e) => {
                if (container.classList.contains('test-finished') && e.key === ' ') {
                    e.preventDefault();
                }
            });

            inputField.addEventListener('keydown', (e) => {
                if (e.key === "Enter") e.preventDefault();
            });

            resetTest();
        })();
    </script>
    <script>
        (function () {
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.main-nav');
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('is-active');
                navMenu.classList.toggle('is-active');
                const isExpanded = hamburger.getAttribute('aria-expanded') === 'true';
                hamburger.setAttribute('aria-expanded', !isExpanded);
            });
        })();

        (function () {
            document.getElementById('copyright-year').textContent = new Date().getFullYear();
        })();
    </script>
